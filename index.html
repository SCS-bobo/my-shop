<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body { background:#f8f9fa; }
    header { background:#2c3e50; color:white; padding:1rem 5%; display:flex; justify-content:space-between; align-items:center; }
    nav a { color:white; margin-left:1rem; text-decoration:none; }
    .container { max-width:700px; margin:2rem auto; padding:0 5%; }
    .section { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 10px #0002; display:none; }
    .active { display:block; }
    h2 { text-align:center; margin-bottom:1.5rem; color:#2c3e50; }
    input, select { width:100%; padding:0.9rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem; }
    button { width:100%; padding:1rem; background:#27ae60; color:white; border:none; border-radius:4px; font-size:1.1rem; cursor:pointer; }
    button:disabled { background:#95a5a6; }
    .msg { padding:1rem; margin:1rem 0; border-radius:4px; text-align:center; }
    .info { background:#e3f2fd; color:#0c5460; }
    .ok { background:#d4edda; color:#155724; }
    .err { background:#f8d7da; color:#721c24; }
  </style>
</head>
<body>

<header>
  <div>🛒 My Shop</div>
  <nav>
    <a href="#" onclick="show('accueil')">Accueil</a>
    <a href="#" onclick="show('inscription')">S'inscrire</a>
    <a href="#" onclick="show('connexion')">Se connecter</a>
  </nav>
</header>

<div class="container">
  <section id="accueil" class="section active">
    <h2>Bienvenue sur My Shop</h2>
    <div id="statut" class="msg info">⏳ Chargement du serveur...</div>
    <div id="produits"></div>
  </section>

  <section id="inscription" class="section">
    <h2>Créer mon compte</h2>
    <div id="msgInsc"></div>
    <input type="text" id="nom" placeholder="Nom complet" required>
    <input type="email" id="email" placeholder="Adresse email" required>
    <input type="tel" id="tel" placeholder="Numéro de téléphone" required>
    <input type="password" id="mdp" placeholder="Mot de passe" required>
    <select id="role">
      <option value="client">Client</option>
      <option value="commercant">Commerçant</option>
    </select>
    <button onclick="inscrire()">Créer mon compte</button>
  </section>

  <section id="connexion" class="section">
    <h2>Me connecter</h2>
    <div id="msgCo"></div>
    <input type="email" id="emailCo" placeholder="Adresse email" required>
    <input type="password" id="mdpCo" placeholder="Mot de passe" required>
    <button onclick="connecter()">Se connecter</button>
  </section>
</div>

<script>
const API = "https://my-shop-9l3j.onrender.com";
let pret = false;

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function verifier(essai = 1) {
  try {
    const res = await fetch(`${API}/ping`, {
      method: 'GET',
      cache: 'no-store',
      mode: 'cors'
    });
    if (res.ok) {
      pret = true;
      document.getElementById('statut').textContent = "✅ Serveur prêt ! Vous pouvez utiliser le site.";
      document.getElementById('statut').className = "msg ok";
      chargerProduits();
      return;
    }
  } catch {}
  document.getElementById('statut').textContent = `⏳ Attente... Essai ${essai}`;
  setTimeout(() => verifier(essai + 1), 5000);
}

async function appel(url, opt = {}) {
  while (!pret) await new Promise(r => setTimeout(r, 500));
  const res = await fetch(url, {
    ...opt,
    mode: 'cors',
    headers: { 'Content-Type': 'application/json', ...opt.headers }
  });
  return res.json();
}

async function chargerProduits() {
  try {
    const data = await appel(`${API}/api/produits`);
    document.getElementById('produits').innerHTML = data.length 
      ? data.map(p => `<div style="padding:1rem; margin:1rem 0; background:#fff; border-radius:6px; box-shadow:0 1px 3px #0002;"><h4>${p.nom}</h4><p style="color:#e67e22; font-weight:bold;">${p.prix.toLocaleString('fr-FR')} FCFA</p></div>`).join('')
      : "<p style='text-align:center; color:#666; margin-top:2rem;'>Aucun produit en vente pour le moment.</p>";
  } catch {}
}

async function inscrire() {
  const msg = document.getElementById('msgInsc');
  msg.className = "msg info"; msg.textContent = "⏳ Envoi en cours...";
  try {
    const res = await appel(`${API}/api/inscription`, {
      method: 'POST',
      body: JSON.stringify({
        nom: document.getElementById('nom').value.trim(),
        email: document.getElementById('email').value.trim(),
        telephone: document.getElementById('tel').value.trim(),
        motDePasse: document.getElementById('mdp').value,
        role: document.getElementById('role').value
      })
    });
    if (res.erreur) throw new Error(res.erreur);
    msg.className = "msg ok"; msg.textContent = "✅ Compte créé avec succès ! Vous pouvez vous connecter.";
    setTimeout(() => show('connexion'), 2000);
  } catch (e) {
    msg.className = "msg err"; msg.textContent = `❌ ${e.message}`;
  }
}

async function connecter() {
  const msg = document.getElementById('msgCo');
  msg.className = "msg info"; msg.textContent = "⏳ Vérification en cours...";
  try {
    const res = await appel(`${API}/api/connexion`, {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('emailCo').value.trim(),
        motDePasse: document.getElementById('mdpCo').value
      })
    });
    if (res.erreur) throw new Error(res.erreur);
    localStorage.setItem('token', res.token);
    msg.className = "msg ok"; msg.textContent = "✅ Connexion réussie ! Bienvenue.";
  } catch (e) {
    msg.className = "msg err"; msg.textContent = `❌ ${e.message}`;
  }
}

window.onload = verifier;
</script>

</body>
</html>
