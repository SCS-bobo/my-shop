<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Important pour l'affichage sur mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop - Place de marché</title>
    <script>
        // ✅ ADRESSE CORRIGÉE : plus de localhost, ton vrai site en ligne
        const API_URL = "https://my-shop-9j3j.onrender.com";
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f8f9fa; line-height: 1.6; }
        header { background: #2c3e50; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        nav a { color: white; margin-left: 1.5rem; text-decoration: none; }
        nav a:hover { color: #f39c12; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 5%; }
        .section { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 2rem; display: none; }
        .section.active { display: block; }
        h2 { color: #2c3e50; margin-bottom: 1.5rem; text-align: center; }
        input, select, textarea { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        button { width: 100%; padding: 0.9rem; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button:hover { background: #219653; }
        .produits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .carte-produit { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .carte-produit img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; margin-bottom: 1rem; }
        .prix { font-size: 1.3rem; font-weight: bold; color: #e67e22; margin: 0.5rem 0; }
        .message { padding: 1rem; margin: 1rem 0; border-radius: 4px; text-align: center; }
        .succes { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .erreur { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .deconnexion { background: #e74c3c; }
        .deconnexion:hover { background: #c0392b; }
    </style>
</head>
<body>

<header>
    <div class="logo">🛒 My Shop</div>
    <nav id="menu">
        <a href="#" onclick="afficherSection('accueil')">Accueil</a>
        <a href="#" onclick="afficherSection('inscription')" id="lienInscription">S'inscrire</a>
        <a href="#" onclick="afficherSection('connexion')" id="lienConnexion">Se connecter</a>
        <a href="#" onclick="afficherSection('espaceVendeur')" id="lienVendeur" style="display:none;">Espace Vendeur</a>
        <a href="#" onclick="afficherSection('mesCommandes')" id="lienCommandes" style="display:none;">Mes Commandes</a>
        <a href="#" onclick="deconnecter()" id="lienDeconnexion" style="display:none;" class="deconnexion">Se déconnecter</a>
    </nav>
</header>

<div class="container">

    <!-- ACCUEIL -->
    <section id="accueil" class="section active">
        <h2>Bienvenue sur My Shop</h2>
        <p style="text-align:center; margin-bottom:2rem;">Votre place de marché en Côte d'Ivoire — achetez et vendez en toute simplicité !</p>
        <div id="listeProduits" class="produits-grid"></div>
    </section>

    <!-- INSCRIPTION -->
    <section id="inscription" class="section">
        <h2>Créer mon compte</h2>
        <div id="msgInscription"></div>
        <input type="text" id="nom" placeholder="Nom complet" required>
        <input type="email" id="email" placeholder="Adresse email" required>
        <input type="tel" id="telephone" placeholder="Numéro de téléphone" required>
        <input type="password" id="motDePasse" placeholder="Mot de passe" required>
        <select id="role">
            <option value="client">Client (pour acheter)</option>
            <option value="commercant">Commerçant (pour vendre)</option>
        </select>
        <button onclick="inscrire()">Créer mon compte</button>
    </section>

    <!-- CONNEXION -->
    <section id="connexion" class="section">
        <h2>Me connecter</h2>
        <div id="msgConnexion"></div>
        <input type="email" id="emailCo" placeholder="Adresse email" required>
        <input type="password" id="motDePasseCo" placeholder="Mot de passe" required>
        <button onclick="connecter()">Se connecter</button>
    </section>

    <!-- ESPACE VENDEUR -->
    <section id="espaceVendeur" class="section">
        <h2>Ajouter un nouveau produit</h2>
        <div id="msgVendeur"></div>
        <input type="text" id="nomProduit" placeholder="Nom du produit" required>
        <textarea id="descriptionProduit" placeholder="Description détaillée" rows="3" required></textarea>
        <input type="number" id="prixProduit" placeholder="Prix en FCFA" min="1" required>
        <input type="number" id="stockProduit" placeholder="Quantité en stock" min="1" required>
        <input type="text" id="categorieProduit" placeholder="Catégorie (ex: Vêtements, Électronique...)" required>
        <input type="file" id="imageProduit" accept="image/*" required>
        <button onclick="ajouterProduit()">Enregistrer le produit</button>
    </section>

    <!-- MES COMMANDES -->
    <section id="mesCommandes" class="section">
        <h2>Mes commandes</h2>
        <div id="listeCommandes"></div>
    </section>

</div>

<script>
// Affichage des sections
function afficherSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.message').forEach(msg => msg.textContent = '');
}

// Inscription
async function inscrire() {
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const tel = document.getElementById('telephone').value.trim();
    const mdp = document.getElementById('motDePasse').value;
    const role = document.getElementById('role').value;
    const msg = document.getElementById('msgInscription');

    try {
        const res = await fetch(`${API_URL}/api/inscription`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom, email, telephone: tel, motDePasse: mdp, role })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erreur || 'Erreur lors de la création');

        msg.className = 'message succes';
        msg.textContent = 'Compte créé avec succès ! Vous pouvez vous connecter.';
        setTimeout(() => afficherSection('connexion'), 1500);
    } catch (err) {
        msg.className = 'message erreur';
        msg.textContent = err.message;
    }
}

// Connexion
async function connecter() {
    const email = document.getElementById('emailCo').value.trim();
    const mdp = document.getElementById('motDePasseCo').value;
    const msg = document.getElementById('msgConnexion');

    try {
        const res = await fetch(`${API_URL}/api/connexion`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, motDePasse: mdp })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erreur || 'Identifiants incorrects');

        localStorage.setItem('token', data.token);
        localStorage.setItem('utilisateur', JSON.stringify(data.utilisateur));
        mettreAJourMenu();
        afficherSection('accueil');
        chargerProduits();
    } catch (err) {
        msg.className = 'message erreur';
        msg.textContent = err.message;
    }
}

// Déconnexion
function deconnecter() {
    localStorage.removeItem('token');
    localStorage.removeItem('utilisateur');
    mettreAJourMenu();
    afficherSection('accueil');
    chargerProduits();
}

// Mise à jour du menu selon la connexion
function mettreAJourMenu() {
    const token = localStorage.getItem('token');
    const utilisateur = JSON.parse(localStorage.getItem('utilisateur') || '{}');
    document.getElementById('lienInscription').style.display = token ? 'none' : 'inline';
    document.getElementById('lienConnexion').style.display = token ? 'none' : 'inline';
    document.getElementById('lienDeconnexion').style.display = token ? 'inline' : 'none';
    document.getElementById('lienVendeur').style.display = (token && utilisateur.role === 'commercant') ? 'inline' : 'none';
    document.getElementById('lienCommandes').style.display = token ? 'inline' : 'none';
}

// Charger tous les produits
async function chargerProduits() {
    const conteneur = document.getElementById('listeProduits');
    try {
        const res = await fetch(`${API_URL}/api/produits`);
        const produits = await res.json();
        if (!res.ok) throw new Error('Impossible de charger les produits');

        if (produits.length === 0) {
            conteneur.innerHTML = '<p style="text-align:center; color:#666;">Aucun produit en vente pour le moment.</p>';
            return;
        }

        conteneur.innerHTML = produits.map(p => `
            <div class="carte-produit">
                <img src="${p.image || 'https://via.placeholder.com/250x180?text=Pas+d%27image'}" alt="${p.nom}">
                <h3>${p.nom}</h3>
                <p class="prix">${p.prix.toLocaleString('fr-FR')} FCFA</p>
                <p>${p.description.slice(0, 80)}...</p>
                <p><strong>Stock :</strong> ${p.stock}</p>
                <button onclick="ajouterAuPanier(${p.id}, '${p.nom}', ${p.prix})">Ajouter au panier</button>
            </div>
        `).join('');
    } catch (err) {
        conteneur.innerHTML = `<p class="message erreur">${err.message}</p>`;
    }
}

// Ajouter produit (vendeur)
async function ajouterProduit() {
    const token = localStorage.getItem('token');
    if (!token) return alert('Veuillez vous connecter en tant que commerçant');

    const formData = new FormData();
    formData.append('nom', document.getElementById('nomProduit').value.trim());
    formData.append('description', document.getElementById('descriptionProduit').value.trim());
    formData.append('prix', document.getElementById('prixProduit').value);
    formData.append('stock', document.getElementById('stockProduit').value);
    formData.append('categorie', document.getElementById('categorieProduit').value.trim());
    formData.append('image', document.getElementById('imageProduit').files[0]);
    const msg = document.getElementById('msgVendeur');

    try {
        const res = await fetch(`${API_URL}/api/produits`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erreur || 'Erreur lors de l\'ajout');

        msg.className = 'message succes';
        msg.textContent = 'Produit ajouté avec succès !';
        setTimeout(() => { afficherSection('accueil'); chargerProduits(); }, 1500);
    } catch (err) {
        msg.className = 'message erreur';
        msg.textContent = err.message;
    }
}

// Initialisation au chargement de la page
window.onload = () => {
    mettreAJourMenu();
    chargerProduits();
};
</script>

</body>
</html>
